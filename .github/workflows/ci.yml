name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_yeolab
          POSTGRES_USER: yeolab
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://yeolab:testpass@localhost:5432/test_yeolab
      DJANGO_SECRET_KEY: test-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create PostgreSQL schema
        run: psql $DATABASE_URL -f schema/postgres_schema.sql

      - name: Run Django migrations
        working-directory: yeolab_search
        run: python manage.py migrate --noinput

      - name: Run Django checks
        working-directory: yeolab_search
        run: python manage.py check --deploy 2>&1 || true

      - name: Collect static files
        working-directory: yeolab_search
        run: python manage.py collectstatic --noinput
