name: yeolab-search

services:
  - name: web
    github:
      repo: byee4/yeolab-kb
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    routes:
      - path: /
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DJANGO_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: CHANGE_ME
      - key: DJANGO_DEBUG
        scope: RUN_TIME
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        scope: RUN_TIME
        value: ".ondigitalocean.app,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        scope: RUN_TIME
        value: "https://*.ondigitalocean.app"
      - key: SECURE_SSL_REDIRECT
        scope: RUN_TIME
        value: "True"
      - key: GLOBUS_CLIENT_ID
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: CHANGE_ME
      - key: GLOBUS_CLIENT_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: CHANGE_ME
      - key: GITHUB_PAT
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: CHANGE_ME
      - key: GITHUB_REPO
        scope: RUN_TIME
        value: byee4/yeolab-publications-db
      - key: GITHUB_BRANCH
        scope: RUN_TIME
        value: main

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1

jobs:
  - name: migrate
    github:
      repo: byee4/yeolab-kb
      branch: main
    dockerfile_path: Dockerfile
    kind: PRE_DEPLOY
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DJANGO_SECRET_KEY
        scope: RUN_TIME
        value: ${web.DJANGO_SECRET_KEY}
    run_command: >
      sh -c '
      set -e;
      echo "Waiting for PostgreSQL to accept connections...";
      until pg_isready -d "$DATABASE_URL"; do sleep 2; done;
      echo "Applying base schema...";
      psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /app/schema/postgres_schema.sql;
      cd /app/yeolab_search;
      echo "Running Django migrations...";
      python manage.py migrate --noinput;
      echo "Running ensure_schema...";
      python manage.py ensure_schema;
      '
