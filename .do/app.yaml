name: yeolab-search

services:
  - name: web
    github:
      repo: <your-github-username>/yeolab-search
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    routes:
      - path: /
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DJANGO_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: CHANGE_ME
      - key: DJANGO_DEBUG
        scope: RUN_TIME
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        scope: RUN_TIME
        value: ${APP_DOMAIN}
      - key: CSRF_TRUSTED_ORIGINS
        scope: RUN_TIME
        value: https://${APP_DOMAIN}
      - key: SECURE_SSL_REDIRECT
        scope: RUN_TIME
        value: "False"
      - key: GLOBUS_CLIENT_ID
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: CHANGE_ME
      - key: GLOBUS_CLIENT_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: CHANGE_ME

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1

jobs:
  - name: migrate
    github:
      repo: <your-github-username>/yeolab-search
      branch: main
    dockerfile_path: Dockerfile
    kind: PRE_DEPLOY
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DJANGO_SECRET_KEY
        scope: RUN_TIME
        value: ${web.DJANGO_SECRET_KEY}
    run_command: cd /app/yeolab_search && python manage.py migrate --noinput
